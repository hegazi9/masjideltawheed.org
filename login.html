<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مدرسة التوحيد القرآنية — تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">


<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --forest:  #1b3a28;
  --emerald: #2d6a4f;
  --jade:    #40916c;
  --mint:    #74c69d;
  --gold:    #d4a017;
  --gold-l:  #f0c040;
  --cream:   #fefcf5;
  --white:   #ffffff;
  --err:     #c0392b;
  --ink:     #0f1f14;
}

body {
  font-family: "Tajawal", sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background:
    radial-gradient(ellipse 80% 60% at 20% 50%, rgba(64,145,108,0.15) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 85% 20%, rgba(212,160,23,0.08) 0%, transparent 50%),
    linear-gradient(160deg, #0f1f14 0%, #1b3a28 40%, #162d1e 100%);
  padding: 30px 20px;
}

/* pattern overlay */
body::before {
  content: "";
  position: fixed; inset: 0; z-index: 0; opacity: 0.04;
  background-image:
    repeating-linear-gradient(45deg, #fff 0, #fff 1px, transparent 0, transparent 50%),
    repeating-linear-gradient(-45deg, #fff 0, #fff 1px, transparent 0, transparent 50%);
  background-size: 28px 28px;
  pointer-events: none;
}

.login-box {
  position: relative; z-index: 1;
  background: var(--cream);
  border-radius: 24px;
  padding: 36px 40px 40px;
  width: 100%;
  max-width: 460px;
  box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(212,160,23,0.15);
  animation: riseIn 0.6s cubic-bezier(0.22,1,0.36,1) both;
}

@keyframes riseIn {
  from { opacity:0; transform: translateY(30px) scale(0.97); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}

/* ── HEADER ── */
.header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 28px;
  padding-bottom: 22px;
  border-bottom: 1.5px solid #e0e8e2;
}

.header-logo {
  width: 72px; height: 72px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
  border: 2px solid rgba(212,160,23,0.3);
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
}

.header-text .school-name {
  font-family: "Amiri", serif;
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--forest);
  line-height: 1.3;
  margin-bottom: 2px;
}

.header-text .school-slogan {
  font-size: 0.78rem;
  color: var(--gold);
  font-weight: 700;
  margin-bottom: 1px;
}

.header-text .school-sub {
  font-size: 0.72rem;
  color: #8a9e94;
}

/* ── WELCOME ── */
.welcome-title {
  font-size: 1.45rem;
  font-weight: 800;
  color: var(--forest);
  margin-bottom: 4px;
}

.welcome-sub {
  font-size: 0.85rem;
  color: #7a8a7e;
  margin-bottom: 22px;
}

/* ── ROLE SELECTOR ── */
.role-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 10px;
}

.role-grid-2 {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-bottom: 22px;
}

.role-grid-2 .role-btn { width: calc(33.333% + 4px); }

.role-btn {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 13px 8px;
  border-radius: 12px;
  border: 2px solid #dde8e2;
  background: white;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
  font-family: "Tajawal", sans-serif;
}

.role-btn:hover { border-color: var(--jade); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(64,145,108,0.12); }

.role-btn.selected {
  border-color: var(--emerald);
  background: linear-gradient(135deg, #eaf4ee, #f0faf4);
  box-shadow: 0 4px 14px rgba(45,106,79,0.18);
  transform: translateY(-2px);
}

.role-btn .r-icon { font-size: 0px; line-height:0; }
.role-btn .r-icon svg { display:block; }
.role-btn .r-name { font-size: 0.78rem; font-weight: 700; color: #4a6358; }
.role-btn.selected .r-name { color: var(--emerald); }
.role-btn.selected svg { stroke: var(--emerald); }

/* ── FIELDS ── */
.field-group { margin-bottom: 16px; }
label { display: block; font-size: 0.82rem; font-weight: 700; color: var(--forest); margin-bottom: 6px; }

.input-wrap { position: relative; }
.input-icon { position: absolute; right: 13px; top: 50%; transform: translateY(-50%); font-size: 0.95rem; color: #9ab0a4; pointer-events: none; }

input[type="text"], input[type="password"] {
  width: 100%; padding: 11px 40px 11px 13px;
  border: 2px solid #dde8e2; border-radius: 11px;
  font-family: "Tajawal", sans-serif; font-size: 0.92rem;
  background: #f8faf8; color: var(--ink);
  outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  direction: ltr; text-align: right;
}
input:focus { border-color: var(--jade); box-shadow: 0 0 0 3px rgba(64,145,108,0.1); background:#fff; }
input.error-input { border-color: var(--err); }

.toggle-pass {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; font-size: 0.95rem; color: #9ab0a4; padding: 0;
}

.error-msg { font-size: 0.76rem; color: var(--err); margin-top: 4px; display: none; }
.error-msg.show { display: block; }

/* ── SUBMIT ── */
.submit-btn {
  width: 100%; padding: 13px;
  background: linear-gradient(135deg, var(--emerald), var(--jade));
  color: white; border: none; border-radius: 11px;
  font-family: "Tajawal", sans-serif; font-size: 1rem; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
  box-shadow: 0 4px 16px rgba(45,106,79,0.3);
  display: flex; align-items: center; justify-content: center; gap: 8px;
  margin-top: 6px;
}
.submit-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(45,106,79,0.4); }
.submit-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

.spinner {
  width: 17px; height: 17px; border: 2px solid rgba(255,255,255,0.4);
  border-top-color: white; border-radius: 50%;
  animation: spin 0.7s linear infinite; display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── ALERT ── */
.alert-box {
  padding: 11px 14px; border-radius: 10px;
  font-size: 0.84rem; margin-bottom: 16px;
  display: none; align-items: center; gap: 8px;
}
.alert-box.show { display: flex; }
.alert-box.error { background: #fdf0ef; border: 1px solid #f5c6c2; color: var(--err); }

/* ── FOOTER ── */
.form-footer { text-align: center; margin-top: 18px; font-size: 0.74rem; color: #aab8b2; }

/* ── WELCOME SCREEN ── */
.welcome-screen { display: none; text-align: center; }
.welcome-check {
  width: 68px; height: 68px; border-radius: 50%;
  background: linear-gradient(135deg, var(--emerald), var(--jade));
  display: flex; align-items: center; justify-content: center;
  font-size: 1.9rem; margin: 0 auto 18px;
  box-shadow: 0 8px 24px rgba(45,106,79,0.3);
}
.welcome-title-big { font-size: 1.35rem; font-weight: 800; color: var(--forest); margin-bottom: 8px; }
.welcome-badge {
  display: inline-block; padding: 5px 18px; border-radius: 99px;
  background: linear-gradient(135deg, var(--emerald), var(--jade));
  color: white; font-size: 0.82rem; font-weight: 600; margin-bottom: 16px;
}
.welcome-msg { font-size: 0.88rem; color: #6a8070; line-height: 1.7; margin-bottom: 24px; }
.redirect-bar { background: #f4f9f5; border-radius: 10px; padding: 11px; font-size: 0.8rem; color: #6a8070; margin-bottom: 18px; }
.redirect-progress { height: 3px; background: #dde8e2; border-radius: 99px; margin-top: 7px; overflow: hidden; }
.redirect-fill { height: 100%; border-radius: 99px; background: linear-gradient(to left, var(--jade), var(--mint)); width: 0%; transition: width 2.5s linear; }
</style>

<script>
let selectedRole = null;

function selectRole(btn) {
  document.querySelectorAll(".role-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
  selectedRole = btn.dataset.role;
  clearErrors();
}

function togglePass() {
  const inp = document.getElementById("password");
  const btn = document.getElementById("toggle-btn");
  if (inp.type === "password") { inp.type = "text"; btn.textContent = "🙈"; }
  else { inp.type = "password"; btn.textContent = "👁️"; }
}

function clearErrors() {
  ["username","password"].forEach(f => {
    document.getElementById("err-" + f).classList.remove("show");
    document.getElementById(f).classList.remove("error-input");
  });
  document.getElementById("alert-box").classList.remove("show");
}

function showAlert(msg) {
  document.getElementById("alert-text").textContent = msg;
  document.getElementById("alert-box").classList.add("show");
}

async function doLogin() {
  clearErrors();
  const user = document.getElementById("username").value.trim();
  const pass = document.getElementById("password").value.trim();

  if (!user) {
    document.getElementById("err-username").classList.add("show");
    document.getElementById("username").classList.add("error-input");
    return;
  }
  if (!pass) {
    document.getElementById("err-password").classList.add("show");
    document.getElementById("password").classList.add("error-input");
    return;
  }
  if (!selectedRole) { showAlert("من فضلك اختر نوع حسابك أولاً"); return; }

  const btn = document.getElementById("login-btn");
  document.getElementById("btn-text").style.display = "none";
  document.getElementById("btn-spinner").style.display = "block";
  btn.disabled = true;

  try {
    const email = user.includes("@") ? user : user + "@altowheed.edu.eg";
    const { data: authData, error: authError } = await window.db.auth.signInWithPassword({ email, password: pass });
    if (authError) throw authError;

    const { data: userData, error: userError } = await window.db
      .from("users").select("*").eq("auth_id", authData.user.id).single();
    if (userError) throw userError;

    if (userData.role !== selectedRole) throw new Error("role_mismatch");

    localStorage.setItem("currentUser", JSON.stringify(userData));
    showWelcome(userData);

  } catch (err) {
    console.error(err);
    showAlert(err.message === "role_mismatch"
      ? "نوع الحساب غير مطابق — تحقق من اختيارك"
      : "البريد الإلكتروني أو كلمة المرور غير صحيحة");
  } finally {
    document.getElementById("btn-text").style.display = "inline";
    document.getElementById("btn-spinner").style.display = "none";
    btn.disabled = false;
  }
}

function showWelcome(userData) {
  document.getElementById("login-form-wrap").style.display = "none";
  document.getElementById("welcome-screen").style.display = "block";
  const roleNames = { admin:"مدير", supervisor:"مشرف", teacher:"معلم", student:"طالب", parent:"ولي أمر" };
  const msgs = {
    admin: "لوحة المدير تتيح لك إدارة كامل المدرسة.",
    supervisor: "لوحة المشرف تتيح لك متابعة الحلقات والتقارير.",
    teacher: "لوحة المعلم تتيح لك تسجيل الحضور ومتابعة الحفظ.",
    student: "لوحتك تعرض تقدمك في الحفظ وجدولك.",
    parent: "يمكنك متابعة تقدم ابنك والتقارير.",
  };
  document.getElementById("w-title").textContent = "مرحباً، " + userData.full_name + "!";
  document.getElementById("w-badge").textContent = roleNames[userData.role] || userData.role;
  document.getElementById("w-msg").textContent = msgs[userData.role] || "";
  setTimeout(() => { document.getElementById("redirect-fill").style.width = "100%"; }, 100);
  setTimeout(() => { goToDashboard(); }, 2500);
}

function goToDashboard() {
  const userData = JSON.parse(localStorage.getItem("currentUser"));
  if (!userData) { window.location.reload(); return; }
  const dashboards = {
    admin: "dashboard_admin.html", supervisor: "dashboard_supervisor.html",
    teacher: "dashboard_teacher.html", student: "dashboard_student.html", parent: "dashboard_parent.html"
  };
  window.location.href = dashboards[userData.role] || "login.html";
}

document.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
</script>
